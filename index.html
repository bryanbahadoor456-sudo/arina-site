<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Arina 💗</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd1dc, #ffe6f0, #fff0f5);
      overflow: hidden;
      padding: 20px;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      color: rgba(255, 64, 129, 0.35);
      font-size: 24px;
      animation: floatUp 7s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.7) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-15vh) scale(1.5) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 560px);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(255, 105, 180, 0.28);
      border: 2px solid rgba(255, 255, 255, 0.9);
    }

    .bear-scene {
      height: 150px;
      position: relative;
      margin-bottom: 12px;
    }

    .bear-couple {
      font-size: 85px;
      animation: cuddle 1.5s ease-in-out infinite;
      filter: drop-shadow(0 10px 12px rgba(255, 105, 180, 0.2));
    }

    .tiny-heart {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      font-size: 28px;
      animation: pulseHeart 1s ease-in-out infinite;
    }

    @keyframes cuddle {
      0%, 100% { transform: translateY(0) rotate(-2deg) scale(1); }
      50% { transform: translateY(-10px) rotate(2deg) scale(1.05); }
    }

    @keyframes pulseHeart {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.75; }
      50% { transform: translateX(-50%) scale(1.35); opacity: 1; }
    }

    h1 {
      color: #ff4f93;
      font-size: clamp(30px, 7vw, 48px);
      margin-bottom: 14px;
      line-height: 1.1;
    }

    p {
      color: #6b3f55;
      font-size: 18px;
      margin-bottom: 26px;
      line-height: 1.45;
    }

    .from {
      font-weight: 800;
      color: #ff2f83;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      min-height: 70px;
      position: relative;
    }

    button {
      border: none;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #yesBtn {
      background: #ff4f93;
      color: white;
      box-shadow: 0 12px 22px rgba(255, 79, 147, 0.35);
    }

    #yesBtn:hover {
      transform: scale(1.09);
      box-shadow: 0 16px 28px rgba(255, 79, 147, 0.45);
    }

    #noBtn {
      background: white;
      color: #ff4f93;
      border: 2px solid #ffb6d5;
    }

    #noBtn.runaway {
      position: fixed;
      z-index: 10;
      animation: shake 0.28s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }

    .small-note {
      margin-top: 18px;
      font-size: 14px;
      color: #9b647d;
    }

    .celebration {
      display: none;
      position: relative;
      z-index: 2;
      width: min(92vw, 560px);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 44px 28px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(255, 105, 180, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.9);
      animation: pop 0.45s ease;
    }

    .cat {
      font-size: 100px;
      animation: catJump 0.7s ease-in-out infinite;
      margin-bottom: 18px;
    }

    @keyframes catJump {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-28px) scale(1.08); }
    }

    @keyframes pop {
      0% { transform: scale(0.78); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .celebration h2 {
      color: #ff2f83;
      font-size: clamp(32px, 8vw, 54px);
      margin-bottom: 12px;
    }

    .celebration p {
      font-size: 20px;
      color: #6b3f55;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main class="card" id="proposalCard">
    <div class="bear-scene">
      <div class="tiny-heart">💞</div>
      <div class="bear-couple">🐻‍❄️💗🐻</div>
    </div>

    <h1>Will you be my girlfriend, Arina?</h1>
    <p>I made this little pink website just for you.<br><span class="from">From Bryan 💗</span></p>

    <div class="buttons">
      <button id="yesBtn">Yes 💕</button>
      <button id="noBtn">No 😭</button>
    </div>

    <div class="small-note">The bear couple already thinks you should say yes 👀</div>
  </main>

  <section class="celebration" id="celebration">
    <div class="cat">😺💖</div>
    <h2>YAYYY!</h2>
    <p>Arina said yes! Bryan is officially the happiest person ever 💗</p>
  </section>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const proposalCard = document.getElementById('proposalCard');
    const celebration = document.getElementById('celebration');
    const hearts = document.getElementById('hearts');

    let noTries = 0;

    yesBtn.addEventListener('click', () => {
      proposalCard.style.display = 'none';
      celebration.style.display = 'block';
      createHeartBurst();
    });

    noBtn.addEventListener('mouseenter', runAway);
    noBtn.addEventListener('click', runAway);
    noBtn.addEventListener('touchstart', runAway);

    function runAway(event) {
      if (event) event.preventDefault();
      noTries++;

      noBtn.classList.add('runaway');
      noBtn.textContent = noTries < 3 ? 'Nope 😭' : 'You sure? 🥺';

      const maxX = window.innerWidth - noBtn.offsetWidth - 30;
      const maxY = window.innerHeight - noBtn.offsetHeight - 30;
      const randomX = Math.max(10, Math.random() * maxX);
      const randomY = Math.max(10, Math.random() * maxY);

      noBtn.style.left = randomX + 'px';
      noBtn.style.top = randomY + 'px';

      if (noTries >= 4) {
        noBtn.style.display = 'none';
        yesBtn.textContent = 'Only option now 💕';
        yesBtn.style.transform = 'scale(1.15)';
      }
    }

    function createFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = ['💗', '💕', '💖', '💘', '🌸'][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 5 + Math.random() * 5 + 's';
      heart.style.fontSize = 18 + Math.random() * 24 + 'px';
      hearts.appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }

    function createHeartBurst() {
      for (let i = 0; i < 60; i++) {
        setTimeout(createFloatingHeart, i * 35);
      }
    }

    setInterval(createFloatingHeart, 450);
  </script>
</body>
</html>
