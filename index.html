<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Arina 💗</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd1dc, #ffe6f0, #fff0f5);
      overflow: hidden;
      padding: 20px;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      color: rgba(255, 64, 129, 0.35);
      font-size: 24px;
      animation: floatUp 7s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.7) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-15vh) scale(1.5) rotate(360deg); opacity: 0; }
    }

    .card, .celebration {
      position: relative;
      z-index: 1;
      width: min(92vw, 570px);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 34px;
      padding: 38px 28px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(255, 105, 180, 0.28);
      border: 2px solid rgba(255, 255, 255, 0.9);
    }

    .bear-scene {
      height: 190px;
      position: relative;
      margin-bottom: 8px;
      display: flex;
      align-items: end;
      justify-content: center;
    }

    .bear-couple {
      position: relative;
      width: 300px;
      height: 170px;
      animation: coupleDance 1.8s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .love-pop {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      font-size: 34px;
      animation: heartPop 1.4s ease-in-out infinite;
      z-index: 5;
    }

    .kiss-heart {
      position: absolute;
      left: 50%;
      top: 72px;
      transform: translateX(-50%);
      font-size: 24px;
      opacity: 0;
      animation: kissHeart 2.4s ease-in-out infinite;
      z-index: 5;
    }

    .bear {
      position: absolute;
      bottom: 0;
      width: 135px;
      height: 145px;
      animation: bearSway 1.8s ease-in-out infinite;
    }

    .bear.left {
      left: 38px;
      transform-origin: bottom center;
    }

    .bear.right {
      right: 38px;
      transform-origin: bottom center;
      animation-delay: 0.25s;
    }

    .bear .body {
      position: absolute;
      bottom: 0;
      left: 22px;
      width: 92px;
      height: 98px;
      background: #c98b5f;
      border: 4px solid #8a5738;
      border-radius: 50% 50% 45% 45%;
      box-shadow: inset -10px -8px 0 rgba(112, 64, 38, 0.14);
    }

    .bear.right .body {
      background: #b87952;
    }

    .bear .belly {
      position: absolute;
      bottom: 13px;
      left: 42px;
      width: 52px;
      height: 58px;
      background: #f4c7a4;
      border-radius: 50%;
      opacity: 0.95;
    }

    .bear .head {
      position: absolute;
      top: 11px;
      left: 19px;
      width: 98px;
      height: 88px;
      background: #c98b5f;
      border: 4px solid #8a5738;
      border-radius: 50%;
      box-shadow: inset -9px -6px 0 rgba(112, 64, 38, 0.12);
    }

    .bear.right .head {
      background: #b87952;
    }

    .ear {
      position: absolute;
      width: 34px;
      height: 34px;
      background: #c98b5f;
      border: 4px solid #8a5738;
      border-radius: 50%;
      top: 2px;
      z-index: -1;
    }

    .bear.right .ear {
      background: #b87952;
    }

    .ear.left-ear { left: 17px; }
    .ear.right-ear { right: 17px; }

    .inner-ear {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #f3b4bd;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .eye {
      position: absolute;
      top: 38px;
      width: 8px;
      height: 12px;
      background: #2d1b14;
      border-radius: 50%;
      animation: blink 4s infinite;
    }

    .eye.left-eye { left: 33px; }
    .eye.right-eye { right: 33px; }

    .snout {
      position: absolute;
      left: 50%;
      top: 47px;
      transform: translateX(-50%);
      width: 38px;
      height: 28px;
      background: #f7cfad;
      border-radius: 50%;
    }

    .nose {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 13px;
      height: 9px;
      background: #2d1b14;
      border-radius: 50%;
    }

    .smile {
      position: absolute;
      top: 14px;
      left: 50%;
      width: 18px;
      height: 10px;
      border-bottom: 3px solid #2d1b14;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .cheek {
      position: absolute;
      top: 55px;
      width: 13px;
      height: 8px;
      background: rgba(255, 92, 151, 0.45);
      border-radius: 50%;
    }

    .cheek.left-cheek { left: 22px; }
    .cheek.right-cheek { right: 22px; }

    .arm {
      position: absolute;
      width: 54px;
      height: 25px;
      background: #c98b5f;
      border: 4px solid #8a5738;
      border-radius: 999px;
      top: 89px;
      z-index: 3;
    }

    .bear.right .arm {
      background: #b87952;
    }

    .bear.left .arm.inside {
      right: -23px;
      transform: rotate(-20deg);
      animation: hugLeft 1.6s ease-in-out infinite;
    }

    .bear.right .arm.inside {
      left: -23px;
      transform: rotate(20deg);
      animation: hugRight 1.6s ease-in-out infinite;
    }

    .bear.left .arm.outside {
      left: -4px;
      transform: rotate(25deg);
      animation: danceArmLeft 1.2s ease-in-out infinite;
    }

    .bear.right .arm.outside {
      right: -4px;
      transform: rotate(-25deg);
      animation: danceArmRight 1.2s ease-in-out infinite;
    }

    .foot {
      position: absolute;
      bottom: -2px;
      width: 35px;
      height: 22px;
      background: #8a5738;
      border-radius: 50%;
      opacity: 0.75;
    }

    .foot.left-foot { left: 32px; }
    .foot.right-foot { right: 32px; }

    @keyframes coupleDance {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-7px) rotate(1deg); }
    }

    @keyframes bearSway {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50% { transform: rotate(4deg) translateY(-8px); }
    }

    @keyframes hugLeft {
      0%, 100% { transform: rotate(-18deg) translateX(0); }
      50% { transform: rotate(-8deg) translateX(12px); }
    }

    @keyframes hugRight {
      0%, 100% { transform: rotate(18deg) translateX(0); }
      50% { transform: rotate(8deg) translateX(-12px); }
    }

    @keyframes danceArmLeft {
      0%, 100% { transform: rotate(28deg); }
      50% { transform: rotate(52deg) translateY(-4px); }
    }

    @keyframes danceArmRight {
      0%, 100% { transform: rotate(-28deg); }
      50% { transform: rotate(-52deg) translateY(-4px); }
    }

    @keyframes heartPop {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.72; }
      50% { transform: translateX(-50%) scale(1.35); opacity: 1; }
    }

    @keyframes kissHeart {
      0%, 35%, 100% { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.7); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-18px) scale(1.2); }
      70% { opacity: 0; transform: translateX(-50%) translateY(-38px) scale(0.9); }
    }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    h1 {
      color: #ff4f93;
      font-size: clamp(30px, 7vw, 48px);
      margin-bottom: 14px;
      line-height: 1.1;
    }

    p {
      color: #6b3f55;
      font-size: 18px;
      margin-bottom: 26px;
      line-height: 1.45;
    }

    .from {
      font-weight: 800;
      color: #ff2f83;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      min-height: 70px;
      position: relative;
    }

    button {
      border: none;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #yesBtn {
      background: #ff4f93;
      color: white;
      box-shadow: 0 12px 22px rgba(255, 79, 147, 0.35);
    }

    #yesBtn:hover {
      transform: scale(1.09);
      box-shadow: 0 16px 28px rgba(255, 79, 147, 0.45);
    }

    #noBtn {
      background: white;
      color: #ff4f93;
      border: 2px solid #ffb6d5;
    }

    #noBtn.runaway {
      position: fixed;
      z-index: 10;
      animation: shake 0.28s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }

    .small-note {
      margin-top: 18px;
      font-size: 14px;
      color: #9b647d;
    }

    .celebration {
      display: none;
      animation: pop 0.45s ease;
    }

    .cat {
      font-size: 105px;
      animation: catJump 0.7s ease-in-out infinite;
      margin-bottom: 18px;
    }

    @keyframes catJump {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-28px) scale(1.08); }
    }

    @keyframes pop {
      0% { transform: scale(0.78); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .celebration h2 {
      color: #ff2f83;
      font-size: clamp(32px, 8vw, 54px);
      margin-bottom: 12px;
    }

    .celebration p {
      font-size: 20px;
      color: #6b3f55;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main class="card" id="proposalCard">
    <div class="bear-scene">
      <div class="love-pop">💞</div>
      <div class="kiss-heart">💋💗</div>

      <div class="bear-couple" aria-label="two cartoon bears dancing, hugging and kissing">
        <div class="bear left">
          <div class="ear left-ear"><span class="inner-ear"></span></div>
          <div class="ear right-ear"><span class="inner-ear"></span></div>
          <div class="head">
            <span class="eye left-eye"></span>
            <span class="eye right-eye"></span>
            <span class="cheek left-cheek"></span>
            <span class="cheek right-cheek"></span>
            <div class="snout"><span class="nose"></span><span class="smile"></span></div>
          </div>
          <div class="body"></div>
          <div class="belly"></div>
          <div class="arm outside"></div>
          <div class="arm inside"></div>
          <div class="foot left-foot"></div>
          <div class="foot right-foot"></div>
        </div>

        <div class="bear right">
          <div class="ear left-ear"><span class="inner-ear"></span></div>
          <div class="ear right-ear"><span class="inner-ear"></span></div>
          <div class="head">
            <span class="eye left-eye"></span>
            <span class="eye right-eye"></span>
            <span class="cheek left-cheek"></span>
            <span class="cheek right-cheek"></span>
            <div class="snout"><span class="nose"></span><span class="smile"></span></div>
          </div>
          <div class="body"></div>
          <div class="belly"></div>
          <div class="arm outside"></div>
          <div class="arm inside"></div>
          <div class="foot left-foot"></div>
          <div class="foot right-foot"></div>
        </div>
      </div>
    </div>

    <h1>Will you be my girlfriend, Arina?</h1>
    <p>I made this little pink website just for you.<br><span class="from">From Bryan 💗</span></p>

    <div class="buttons">
      <button id="yesBtn">Yes 💕</button>
      <button id="noBtn">No 😭</button>
    </div>

    <div class="small-note">The bears are dancing because they already know the answer 👀</div>
  </main>

  <section class="celebration" id="celebration">
    <div class="cat">😺💖</div>
    <h2>SHE SAID YES!</h2>
    <p>Bryan is officially the happiest person ever 💘</p>
  </section>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const proposalCard = document.getElementById('proposalCard');
    const celebration = document.getElementById('celebration');
    const hearts = document.getElementById('hearts');

    let noTries = 0;

    yesBtn.addEventListener('click', () => {
      proposalCard.style.display = 'none';
      celebration.style.display = 'block';
      createHeartBurst();
    });

    noBtn.addEventListener('mouseenter', runAway);
    noBtn.addEventListener('click', runAway);
    noBtn.addEventListener('touchstart', runAway);

    function runAway(event) {
      if (event) event.preventDefault();
      noTries++;

      const messages = [
        'No 😭',
        'Are you sure? 🥺',
        'Really sure?? 😭',
        'Please say yes 💔',
        'Last chance 😭'
      ];

      noBtn.classList.add('runaway');
      noBtn.textContent = messages[Math.min(noTries, messages.length - 1)];

      const maxX = window.innerWidth - noBtn.offsetWidth - 30;
      const maxY = window.innerHeight - noBtn.offsetHeight - 30;
      const randomX = Math.max(10, Math.random() * maxX);
      const randomY = Math.max(10, Math.random() * maxY);

      noBtn.style.left = randomX + 'px';
      noBtn.style.top = randomY + 'px';

      if (noTries >= 4) {
        noBtn.style.display = 'none';
        yesBtn.textContent = 'Only option now 💕';
        yesBtn.style.transform = 'scale(1.15)';
      }
    }

    function createFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = ['💗', '💕', '💖', '💘', '🌸'][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = 5 + Math.random() * 5 + 's';
      heart.style.fontSize = 18 + Math.random() * 24 + 'px';
      hearts.appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }

    function createHeartBurst() {
      for (let i = 0; i < 60; i++) {
        setTimeout(createFloatingHeart, i * 35);
      }
    }

    setInterval(createFloatingHeart, 450);
  </script>
</body>
</html>
